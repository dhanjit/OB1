services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ob1-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${OB1_DB_NAME:-openbrain}
      POSTGRES_USER: ${OB1_DB_USER:-openbrain}
      POSTGRES_PASSWORD: ${OB1_DB_PASSWORD:-openbrain}
    ports:
      - "${OB1_DB_PORT:-5433}:5432"
    volumes:
      - ob1_pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${OB1_DB_USER:-openbrain} -d ${OB1_DB_NAME:-openbrain}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  ob1_pgdata:
